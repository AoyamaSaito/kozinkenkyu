<title>{{TITLE_PLAIN}} — 導入シート</title>
<style>
  /* ============================================================
     マダミス4 導入シート テンプレート
     ここには見た目（スタイル・レイアウト）だけを置く。
     文言の正: data/配布物/共通/intro_sheet.md（二重波括弧のプレースホルダに流し込まれる）
     デザイン仕様の正: scenario/07_visual_design.md
     1600x1000 設計・cqw基準で全比率スケール・単一暗色テーマ
     ============================================================ */
  .stage{
    container-type:inline-size;
    max-width:1600px;margin:0 auto;
    font-family:"Yu Gothic","YuGothic","Hiragino Kaku Gothic ProN","Meiryo",sans-serif;
  }
  .sheet{
    position:relative;width:100%;aspect-ratio:16/10;
    background:#0A0E1A;overflow:hidden;
    color:#E9F1F7;
  }
  .sheet *{box-sizing:border-box;margin:0;padding:0}

  /* ---- 大気: 赤いもや ---- */
  .haze{position:absolute;inset:0;pointer-events:none}
  .haze-a{background:radial-gradient(55% 45% at 85% -8%, rgba(255,42,68,.30), transparent 70%)}
  .haze-b{background:radial-gradient(50% 40% at -10% 105%, rgba(140,15,30,.38), transparent 70%)}
  .haze-c{background:linear-gradient(180deg, rgba(255,42,68,.07), transparent 30%, transparent 78%, rgba(140,15,30,.16))}

  /* ---- スキャンライン ---- */
  .scan{position:absolute;inset:0;pointer-events:none;opacity:.5;
    background:repeating-linear-gradient(0deg, rgba(0,0,0,.22) 0, rgba(0,0,0,.22) .0625cqw, transparent .0625cqw, transparent .25cqw)}

  /* ---- HUDフレーム ---- */
  .frame{position:absolute;inset:1.4cqw;border:1px solid rgba(77,234,255,.30);pointer-events:none}
  .frame::before,.frame::after{content:"";position:absolute;width:1.6cqw;height:1.6cqw}
  .frame::before{top:-1px;left:-1px;border-top:.22cqw solid #FCEE0A;border-left:.22cqw solid #FCEE0A}
  .frame::after{bottom:-1px;right:-1px;border-bottom:.22cqw solid #FCEE0A;border-right:.22cqw solid #FCEE0A}

  .inner{position:absolute;inset:1.4cqw;display:flex;flex-direction:column;padding:1.5cqw 2.2cqw 0}

  /* ---- ヘッダ行 ---- */
  .topbar{display:flex;justify-content:space-between;align-items:baseline;
    font-family:Consolas,"Courier New",monospace;font-size:.72cqw;letter-spacing:.22em;
    color:rgba(77,234,255,.75);text-transform:uppercase}
  .topbar .mock{color:rgba(201,216,228,.40);letter-spacing:.14em}

  /* ---- 本体2カラム ---- */
  .cols{flex:1;display:grid;grid-template-columns:57% 1fr;gap:2.6cqw;margin-top:1.2cqw;min-height:0}

  /* 左: タイトル+導入 */
  h1{font-size:4.3cqw;font-weight:900;line-height:1.08;color:#F2F7FB;margin-top:.6cqw;
    letter-spacing:.04em;
    text-shadow:.14cqw 0 rgba(255,42,68,.55), -.14cqw 0 rgba(77,234,255,.45)}
  h1 ruby{text-shadow:inherit}
  h1 rt{font-size:.72cqw;font-weight:400;letter-spacing:.5em;color:rgba(77,234,255,.8);text-shadow:none}
  .en-title{font-family:Consolas,"Courier New",monospace;font-size:.95cqw;letter-spacing:.42em;
    color:#FCEE0A;margin-top:.55cqw;text-transform:uppercase}
  .rule{height:1px;background:linear-gradient(90deg,#4DEAFF,rgba(77,234,255,.08));margin:1.15cqw 0 1.2cqw;position:relative}
  .rule::before{content:"";position:absolute;left:0;top:-.14cqw;width:4.5cqw;height:.32cqw;background:#4DEAFF}

  /* 本文は data/配布物/共通/intro_sheet.md が正（逐語抜粋ルール） */
  .lead{font-size:1.07cqw;line-height:1.76}
  .lead p{margin-bottom:.62cqw}
  .lead .em{color:#F2F7FB;font-weight:700}
  .term{color:#A9E6F8}
  .left{display:flex;flex-direction:column}
  .readout{margin-top:auto;margin-bottom:1.2cqw;font-family:Consolas,"Courier New",monospace;
    font-size:.72cqw;line-height:1.9;letter-spacing:.16em;color:rgba(77,234,255,.42);
    border-left:.2cqw solid rgba(252,238,10,.55);padding-left:1cqw}

  /* 右: 勢力パネル */
  .panel{border-left:1px solid rgba(77,234,255,.25);padding-left:2.2cqw;display:flex;flex-direction:column}
  .panel-label{font-family:Consolas,"Courier New",monospace;font-size:.72cqw;letter-spacing:.3em;
    color:#FCEE0A;text-transform:uppercase}
  .panel-label span{color:rgba(201,216,228,.55);letter-spacing:.12em}
  .facs{display:flex;flex-direction:column;gap:1.05cqw;margin-top:.9cqw}
  .fac{padding-bottom:.95cqw;border-bottom:1px solid rgba(77,234,255,.14)}
  .fac:last-child{border-bottom:none}
  .fac-tag{font-family:Consolas,"Courier New",monospace;font-size:.74cqw;letter-spacing:.3em;color:#4DEAFF}
  .fac-name{font-size:1.5cqw;font-weight:800;color:#F2F7FB;margin-top:.18cqw;letter-spacing:.02em}
  .fac-name .en{font-family:Consolas,"Courier New",monospace;font-size:.66cqw;font-weight:400;
    letter-spacing:.24em;color:rgba(201,216,228,.42);margin-left:.7cqw;vertical-align:.28cqw}
  .fac-desc{font-size:1.0cqw;line-height:1.68;color:#C6D5E0;margin-top:.22cqw}

  /* 警告ボックス（注記＋締め）: 右カラム下 */
  .alert{margin-top:auto;border:1px solid rgba(77,234,255,.35);background:rgba(77,234,255,.05);
    padding:.95cqw 1.15cqw;
    clip-path:polygon(0 0,100% 0,100% calc(100% - .8cqw),calc(100% - .8cqw) 100%,0 100%)}
  .alert-note{font-size:.95cqw;line-height:1.72;color:#E9F1F7}
  .closing{margin-top:.65cqw;font-size:1.04cqw;font-weight:700;color:#4DEAFF;line-height:1.72}
  .closing::before{content:"▶ ";color:#FCEE0A}

  .chips{display:flex;gap:.6cqw;margin:.9cqw 0 1.1cqw;flex-wrap:wrap}
  .chip{font-family:Consolas,"Courier New",monospace;font-size:.72cqw;letter-spacing:.14em;
    color:#4DEAFF;border:1px solid rgba(77,234,255,.4);padding:.24cqw .7cqw;
    clip-path:polygon(.4cqw 0,100% 0,100% 100%,0 100%,0 .4cqw)}

  /* ---- ハザードストリップ ---- */
  .hazard{position:relative;margin:0 -2.2cqw;background:#FCEE0A;color:#0A0E1A;
    display:flex;align-items:center;justify-content:space-between;
    padding:.55cqw 3.8cqw;font-weight:700;font-size:.88cqw;letter-spacing:.06em}
  .hazard::before,.hazard::after{content:"";position:absolute;top:0;bottom:0;width:2.4cqw;
    background:repeating-linear-gradient(-45deg,#0A0E1A 0,#0A0E1A .5cqw,#FCEE0A .5cqw,#FCEE0A 1cqw)}
  .hazard::before{left:0}
  .hazard::after{right:0}
  .hazard .r{font-family:Consolas,"Courier New",monospace;font-size:.72cqw;letter-spacing:.22em;font-weight:700}
</style>

<div class="stage">
  <div class="sheet">
    <div class="haze haze-a"></div>
    <div class="haze haze-b"></div>
    <div class="haze haze-c"></div>
    <div class="scan"></div>
    <div class="frame"></div>

    <div class="inner">
      <div class="topbar">
        <div>{{EYEBROW}}</div>
        <div class="mock">{{STAMP}}</div>
      </div>

      <div class="cols">
        <div class="left">
          <h1>{{TITLE_HTML}}</h1>
          <div class="en-title">{{EN_TITLE}}</div>
          <div class="rule"></div>
          <div class="lead">
{{LEAD_HTML}}
          </div>
          <div class="readout">
{{READOUT_HTML}}
          </div>
        </div>

        <div class="panel">
          <div class="panel-label">{{PANEL_LABEL_HTML}}</div>
          <div class="facs">
{{FACS_HTML}}
          </div>
          <div class="alert">
            <div class="alert-note">{{NOTE_HTML}}</div>
            <div class="closing">{{CLOSING_HTML}}</div>
          </div>
          <div class="chips">
{{CHIPS_HTML}}
          </div>
        </div>
      </div>

      <div class="hazard">
        <div>{{HAZARD_TEXT}}</div>
        <div class="r">{{HAZARD_EN}}</div>
      </div>
    </div>
  </div>
</div>
